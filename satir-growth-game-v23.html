<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เส้นทางของใจ · น้องฮัก v20</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream:    #fdf6ec;
  --cream2:   #f5ecd8;
  --warm:     #ede0c8;
  --brown:    #8b6340;
  --brown2:   #6b4c2a;
  --green:    #5a8a5a;
  --green2:   #3d6b3d;
  --green3:   #c8e6c8;
  --mint:     #a8d5a8;
  --sage:     #7ab87a;
  --gold:     #d4892a;
  --gold2:    #f0a840;
  --rose:     #d4756a;
  --sky:      #7ab5d4;
  --lavender: #a890c8;
  --text:     #3a2a1a;
  --muted:    #8a7060;
  --white:    #fffdf8;
  --shadow:   rgba(90,60,20,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--cream);
  color: var(--text);
  font-family: 'Sarabun', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  padding-bottom: 60px;
}

/* ── FLOATING PARTICLES ── */
#particles { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
.particle {
  position: absolute;
  border-radius: 50%;
  animation: float linear infinite;
  opacity: 0;
}
@keyframes float {
  0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10%  { opacity: 0.6; }
  90%  { opacity: 0.6; }
  100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
}

/* ── MAIN WRAP ── */
#app { position:relative; z-index:1; max-width:680px; margin:0 auto; padding:16px; }

/* ── HEADER ── */
.header {
  text-align: center;
  padding: 28px 16px 20px;
  position: relative;
}
.header-leaves {
  position: absolute; top: 0; left: 0; right: 0;
  font-size: 1.6rem; opacity: 0.18; letter-spacing: 8px;
  pointer-events: none;
}
.header h1 {
  font-family: 'Mitr', sans-serif;
  font-size: 2rem;
  font-weight: 600;
  color: var(--green2);
  text-shadow: 0 2px 8px rgba(61,107,61,0.2);
  margin-bottom: 4px;
}
.header-sub {
  font-size: 0.85rem;
  color: var(--muted);
  letter-spacing: 0.05em;
}
.header-tagline {
  display: inline-block;
  margin-top: 10px;
  background: var(--green3);
  color: var(--green2);
  padding: 5px 16px;
  border-radius: 20px;
  font-size: 0.82rem;
  font-family: 'Mitr', sans-serif;
}

/* ── TABS ── */
.mode-tabs {
  display: flex; gap: 6px; margin-bottom: 16px;
  background: var(--warm); border-radius: 16px;
  padding: 5px; border: 2px solid rgba(139,99,64,0.15);
  box-shadow: 0 2px 12px var(--shadow);
}
.mode-tab {
  flex: 1; padding: 9px 6px; border-radius: 11px;
  border: none; background: transparent;
  color: var(--muted); font-family: 'Mitr', sans-serif;
  font-size: 0.78rem; cursor: pointer;
  transition: all 0.25s; text-align: center; line-height: 1.3;
}
.mode-tab.active {
  background: var(--white);
  color: var(--green2);
  box-shadow: 0 2px 8px var(--shadow);
  font-weight: 500;
}

/* ── STAGE PROGRESS ── */
.progress-wrap { margin-bottom: 14px; }
.progress-steps { display:flex; gap:3px; align-items:center; justify-content:center; }
.ps { display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; max-width:72px; }
.ps .dot {
  width: 14px; height: 14px; border-radius: 50%;
  background: var(--warm); border: 2px solid rgba(139,99,64,0.2);
  transition: all 0.4s; position:relative;
}
.ps-line { flex:1; height:2px; background:rgba(139,99,64,0.15); border-radius:2px; margin-bottom:14px; }
.ps.done .dot { background: var(--sage); border-color: var(--green); box-shadow: 0 0 8px rgba(90,138,90,0.4); }
.ps.active .dot {
  background: var(--gold2); border-color: var(--gold);
  box-shadow: 0 0 12px rgba(212,137,42,0.5);
  animation: pulse-dot 1.5s ease-in-out infinite;
}
@keyframes pulse-dot { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }
.ps .lbl { font-size: 0.5rem; color: var(--muted); text-align:center; line-height:1.3; }
.ps.active .lbl { color: var(--gold); font-weight:600; }
.ps.done .lbl { color: var(--green); }

/* ── EMOTION BAR ── */
.emo-bar {
  background: var(--white); border: 1.5px solid rgba(139,99,64,0.15);
  border-radius: 14px; padding: 11px 14px; margin-bottom: 14px;
  box-shadow: 0 2px 10px var(--shadow);
}
.emo-title { font-size: 0.7rem; color: var(--muted); margin-bottom: 8px; letter-spacing:0.06em; font-family:'Mitr',sans-serif; }
.emo-list { display:flex; gap:6px; flex-wrap:wrap; }
.emo-tag {
  padding: 4px 11px; border-radius: 20px; font-size: 0.78rem;
  border: 1.5px solid; transition: all 0.4s; opacity: 0.25;
  font-family: 'Mitr', sans-serif;
}
.emo-tag.active { opacity: 1; transform: scale(1.08); }
.emo-tag.confused { border-color: var(--lavender); color: var(--lavender); background: rgba(168,144,200,0.1); }
.emo-tag.scared   { border-color: var(--rose);     color: var(--rose);     background: rgba(212,117,106,0.08); }
.emo-tag.brave    { border-color: var(--gold);     color: var(--gold);     background: rgba(212,137,42,0.1); }
.emo-tag.hopeful  { border-color: var(--green);    color: var(--green);    background: rgba(90,138,90,0.1); }
.emo-tag.proud    { border-color: var(--sky);      color: var(--sky);      background: rgba(122,181,212,0.1); }
.emo-tag.angry    { border-color: #c07050;         color: #c07050;         background: rgba(192,112,80,0.08); }

/* ── SCENE CARD ── */
.scene-card {
  background: var(--white);
  border: 1.5px solid rgba(139,99,64,0.15);
  border-radius: 20px;
  padding: 22px 20px 20px;
  margin-bottom: 14px;
  box-shadow: 0 4px 20px var(--shadow);
  animation: slideUp 0.45s cubic-bezier(0.22,0.61,0.36,1);
  position: relative;
  overflow: hidden;
}
.scene-card::before {
  content: '';
  position: absolute; top:0; left:0; right:0; height:4px;
  background: linear-gradient(90deg, var(--sage), var(--gold2), var(--mint));
  border-radius: 20px 20px 0 0;
}
@keyframes slideUp {
  from { opacity:0; transform:translateY(20px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── STAGE BADGE ── */
.stage-badge {
  display: inline-flex; align-items:center; gap:7px;
  background: var(--green3); border: 1.5px solid rgba(90,138,90,0.3);
  border-radius: 22px; padding: 5px 14px;
  font-size: 0.76rem; color: var(--green2); margin-bottom: 14px;
  font-family: 'Mitr', sans-serif; font-weight:500;
}

/* ── CSS MINNA CHARACTER ── */
.char-row { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
.minna-char {
  width: 56px; height: 56px; flex-shrink:0;
  position: relative;
}
/* Face */
.minna-face {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, #fde8d0, #f8d0b0);
  border: 2px solid rgba(180,120,80,0.3);
  position: absolute; top:6px; left:6px;
  box-shadow: 0 3px 8px rgba(150,90,50,0.2);
}
/* Hair */
.minna-hair {
  width: 46px; height: 28px; border-radius: 23px 23px 0 0;
  background: linear-gradient(135deg, #5a3a1a, #3a2010);
  position: absolute; top:4px; left:5px;
  z-index: 2;
}
.minna-hair::after {
  content:'';
  width: 10px; height: 18px; border-radius: 0 0 8px 8px;
  background: linear-gradient(135deg, #5a3a1a, #3a2010);
  position:absolute; right:-2px; top:8px;
}
/* Eyes - change by emotion */
.minna-eyes {
  position: absolute; top: 18px; left: 9px; width: 26px;
  display: flex; gap: 6px; z-index:3;
}
.eye {
  width: 7px; height: 7px; border-radius: 50%;
  background: #3a2010; position:relative;
}
.eye::after {
  content:''; width:2px; height:2px; border-radius:50%;
  background:white; position:absolute; top:1px; right:1px;
}
/* Mouth */
.minna-mouth {
  position: absolute; bottom: 10px; left: 50%; transform:translateX(-50%);
  z-index:3; transition: all 0.4s;
}
.mouth-happy { width:12px; height:6px; border-radius:0 0 8px 8px; border:2px solid #c07050; border-top:none; }
.mouth-sad   { width:12px; height:6px; border-radius:8px 8px 0 0; border:2px solid #c07050; border-bottom:none; margin-top:4px; }
.mouth-neutral { width:10px; height:2px; background:#c07050; border-radius:2px; }
/* Cheeks */
.minna-cheeks {
  position:absolute; top:22px; z-index:3; width:100%;
  display:flex; justify-content:space-between; padding:0 7px;
}
.cheek { width:8px; height:5px; border-radius:50%; background:rgba(220,130,110,0.35); }
/* Body / Uniform */
.minna-body {
  width: 38px; height: 22px;
  background: linear-gradient(135deg, #4a7a9b, #3a6a8b);
  border-radius: 6px 6px 0 0;
  position: absolute; bottom:0; left:9px;
  z-index:1;
}
.minna-collar {
  width:14px; height:10px; background:#fdf6ec;
  position:absolute; bottom:12px; left:21px; z-index:4;
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
}

/* ── CSS CHARACTER: พ่อ ── */
.dad-char { width:56px; height:56px; flex-shrink:0; position:relative; }
.dad-face { width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#f0d8b8,#dfc0a0);border:2px solid rgba(150,100,60,0.35);position:absolute;top:6px;left:6px;box-shadow:0 3px 8px rgba(120,70,30,0.2); }
.dad-hair { width:46px;height:18px;border-radius:23px 23px 0 0;background:linear-gradient(135deg,#3a2a14,#2a1a08);position:absolute;top:4px;left:5px;z-index:2; }
.dad-eyes { position:absolute;top:18px;left:9px;width:26px;display:flex;gap:6px;z-index:3; }
.dad-mouth-smile { width:14px;height:7px;border-radius:0 0 8px 8px;border:2px solid #a06040;border-top:none;position:absolute;bottom:10px;left:50%;transform:translateX(-50%);z-index:3; }
.dad-body { width:40px;height:22px;background:linear-gradient(135deg,#3a5a7a,#2a4a6a);border-radius:6px 6px 0 0;position:absolute;bottom:0;left:8px;z-index:1; }
.dad-tie { width:8px;height:14px;background:linear-gradient(#c04040,#901010);border-radius:3px 3px 4px 4px;position:absolute;bottom:8px;left:50%;transform:translateX(-50%);z-index:4; }
/* ── CSS CHARACTER: แม่ ── */
.mom-char { width:56px;height:56px;flex-shrink:0;position:relative; }
.mom-face { width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#fde8d8,#f8d0c0);border:2px solid rgba(200,140,100,0.3);position:absolute;top:6px;left:6px;box-shadow:0 3px 8px rgba(160,100,60,0.2); }
.mom-hair { width:50px;height:34px;border-radius:25px 25px 0 0;background:linear-gradient(135deg,#6a3a1a,#4a2a0a);position:absolute;top:2px;left:3px;z-index:2; }
.mom-hair::after { content:'';width:12px;height:22px;border-radius:0 0 10px 10px;background:linear-gradient(135deg,#6a3a1a,#4a2a0a);position:absolute;right:-2px;top:10px; }
.mom-hair-l { width:12px;height:22px;border-radius:0 0 10px 10px;background:linear-gradient(135deg,#6a3a1a,#4a2a0a);position:absolute;left:-2px;top:10px;z-index:2; }
.mom-eyes { position:absolute;top:18px;left:9px;width:26px;display:flex;gap:6px;z-index:3; }
.mom-mouth { width:12px;height:6px;border-radius:0 0 8px 8px;border:2px solid #c08070;border-top:none;position:absolute;bottom:11px;left:50%;transform:translateX(-50%);z-index:3; }
.mom-cheeks { position:absolute;top:22px;z-index:3;width:100%;display:flex;justify-content:space-between;padding:0 7px; }
.mom-body { width:40px;height:22px;background:linear-gradient(135deg,#9a5a7a,#7a3a5a);border-radius:6px 6px 0 0;position:absolute;bottom:0;left:8px;z-index:1; }
/* ── CSS CHARACTER: ครูแนะแนว ── */
.teacher-char { width:56px;height:56px;flex-shrink:0;position:relative; }
.teacher-face { width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#f0dcc8,#e0c8b0);border:2px solid rgba(160,120,80,0.3);position:absolute;top:6px;left:6px;box-shadow:0 3px 8px rgba(130,90,50,0.2); }
.teacher-hair { width:46px;height:26px;border-radius:23px 23px 0 0;background:linear-gradient(135deg,#4a3020,#3a2010);position:absolute;top:4px;left:5px;z-index:2; }
.teacher-glasses { position:absolute;top:17px;left:7px;z-index:4;width:30px;height:10px; }
.teacher-glasses::before { content:'';position:absolute;left:0;top:0;width:11px;height:9px;border:1.5px solid #8a7060;border-radius:3px; }
.teacher-glasses::after  { content:'';position:absolute;right:0;top:0;width:11px;height:9px;border:1.5px solid #8a7060;border-radius:3px; }
.teacher-eyes { position:absolute;top:19px;left:9px;width:26px;display:flex;gap:6px;z-index:5; }
.teacher-mouth { width:12px;height:6px;border-radius:0 0 8px 8px;border:2px solid #9a7060;border-top:none;position:absolute;bottom:10px;left:50%;transform:translateX(-50%);z-index:3; }
.teacher-body { width:40px;height:22px;background:linear-gradient(135deg,#5a7a5a,#3a5a3a);border-radius:6px 6px 0 0;position:absolute;bottom:0;left:8px;z-index:1; }
.char-name  { font-family:'Mitr',sans-serif; font-size:1rem; color:var(--green2); font-weight:500; }
.char-sub   { font-size: 0.74rem; color: var(--muted); margin-top:2px; }

/* ── SCENE TEXT (typewriter) ── */
.scene-text {
  font-size: 0.97rem; line-height: 1.9; color: var(--text);
  margin-bottom: 12px;
}
.scene-text.typing::after {
  content: '|'; animation: blink 0.8s step-end infinite;
  color: var(--green);
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.inner-voice {
  background: linear-gradient(135deg, rgba(122,181,212,0.12), rgba(168,144,200,0.1));
  border-left: 3px solid var(--sky);
  border-radius: 0 12px 12px 0;
  padding: 10px 14px; margin: 12px 0;
  font-size: 0.87rem; color: #5a7a9a; font-style:italic;
  line-height: 1.7;
}
.inner-voice::before { content:'💭 '; }

.depathologize {
  background: linear-gradient(135deg, rgba(90,138,90,0.1), rgba(168,214,168,0.15));
  border: 1.5px solid rgba(90,138,90,0.25);
  border-radius: 12px; padding: 11px 15px; margin: 12px 0;
  font-size: 0.84rem; color: var(--green2); line-height: 1.7;
}
.depathologize::before { content:'🌿 '; }

.coping-hint {
  background: linear-gradient(135deg, rgba(168,144,200,0.12), rgba(200,168,230,0.1));
  border: 1.5px solid rgba(168,144,200,0.3);
  border-radius: 12px; padding: 11px 15px; margin: 12px 0;
  font-size: 0.84rem; color: #7060a0; line-height: 1.7;
}
.coping-hint::before { content:'🛡️ '; }

.chooser-box {
  background: linear-gradient(135deg, rgba(212,137,42,0.1), rgba(240,168,64,0.12));
  border: 1.5px solid rgba(212,137,42,0.3);
  border-radius: 12px; padding: 11px 15px; margin: 12px 0;
  font-size: 0.85rem; color: var(--gold); line-height:1.7;
}
.chooser-box::before { content:'🎯 '; }

/* ── TUNING-IN ── */
.tuning-btn {
  display: flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, rgba(122,181,212,0.15), rgba(168,144,200,0.12));
  border: 1.5px solid rgba(122,181,212,0.4);
  border-radius: 12px; padding: 10px 15px; margin: 8px 0 14px;
  cursor: pointer; color: #5a7a9a; font-family: 'Sarabun', sans-serif;
  font-size: 0.86rem; transition: all 0.22s; width: 100%;
}
.tuning-btn:hover { background: rgba(122,181,212,0.2); transform: translateX(2px); }
.tuning-btn .tb-icon { font-size: 1.1rem; }
.tuning-btn .tb-skip { margin-left: auto; font-size: 0.72rem; opacity: 0.55; }

.tuning-overlay {
  position: fixed; inset: 0; background: rgba(20,30,40,0.72);
  z-index: 900; display: flex; align-items: center; justify-content: center;
  padding: 20px; animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.tuning-panel {
  background: linear-gradient(160deg, #1a2a3a, #0e1a28);
  border: 1.5px solid rgba(122,181,212,0.3);
  border-radius: 22px; padding: 28px 24px; max-width: 380px; width: 100%;
  text-align: center; position: relative;
}
.tuning-panel h3 {
  font-family: 'Mitr', sans-serif; font-size: 1.05rem;
  color: #a8d8f0; margin-bottom: 6px;
}
.tuning-panel .t-sub { font-size: 0.8rem; color: rgba(168,216,240,0.6); margin-bottom: 22px; }

/* Breathing ring */
.breath-ring-wrap { position: relative; width: 110px; height: 110px; margin: 0 auto 20px; }
.breath-ring-outer {
  position: absolute; inset: 0; border-radius: 50%;
  border: 3px solid rgba(122,181,212,0.25);
  animation: breathe-outer 8s ease-in-out infinite;
}
.breath-ring-inner {
  position: absolute; inset: 12px; border-radius: 50%;
  background: radial-gradient(circle, rgba(122,181,212,0.35), rgba(168,144,200,0.2));
  animation: breathe 8s ease-in-out infinite;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem;
}
@keyframes breathe {
  0%,100% { transform: scale(0.85); opacity: 0.7; }
  50%      { transform: scale(1.1);  opacity: 1; }
}
@keyframes breathe-outer {
  0%,100% { transform: scale(1);    opacity: 0.3; }
  50%      { transform: scale(1.18); opacity: 0.7; }
}
.breath-label {
  font-size: 0.78rem; color: rgba(168,216,240,0.7);
  font-family: 'Mitr', sans-serif; margin-bottom: 18px;
  animation: breathe 8s ease-in-out infinite;
  min-height: 20px;
}

.body-signal {
  background: rgba(255,255,255,0.06); border-radius: 14px;
  padding: 14px 16px; margin: 0 0 14px; text-align: left;
  opacity: 0; transition: opacity 0.8s ease; font-size: 0.86rem;
  color: rgba(220,240,255,0.85); line-height: 1.75;
}
.body-signal.visible { opacity: 1; }
.body-signal-label {
  font-family: 'Mitr', sans-serif; font-size: 0.72rem;
  color: rgba(122,181,212,0.7); letter-spacing: 0.07em; margin-bottom: 6px;
}
.observer-note {
  font-size: 0.78rem; color: rgba(200,220,240,0.55);
  font-style: italic; margin-bottom: 18px; line-height: 1.6;
  opacity: 0; transition: opacity 0.8s ease 0.4s;
}
.observer-note.visible { opacity: 1; }

.tuning-close-btn {
  background: linear-gradient(135deg, var(--green), var(--green2));
  border: none; border-radius: 11px; padding: 12px 24px;
  color: white; font-family: 'Mitr', sans-serif; font-size: 0.92rem;
  cursor: pointer; transition: all 0.22s; opacity: 0; pointer-events: none;
  transition: opacity 0.5s ease 0.3s, transform 0.22s;
}
.tuning-close-btn.visible { opacity: 1; pointer-events: auto; }
.tuning-close-btn:hover { transform: translateY(-2px); }

/* CHOICES ── */
.choices-label {
  font-size: 0.72rem; color: var(--muted); margin-bottom: 10px;
  text-transform: uppercase; letter-spacing: 0.08em;
  font-family: 'Mitr', sans-serif;
}
.choice-btn {
  width: 100%; background: var(--cream);
  border: 1.5px solid rgba(139,99,64,0.2);
  border-radius: 13px; padding: 13px 15px; margin-bottom: 8px;
  cursor: pointer; text-align: left; color: var(--text);
  font-family: 'Sarabun', sans-serif; font-size: 0.94rem; line-height: 1.65;
  transition: all 0.22s;
}
.choice-btn:hover {
  border-color: var(--sage); background: rgba(90,138,90,0.07);
  transform: translateX(4px);
  box-shadow: 0 2px 12px rgba(90,138,90,0.15);
}
.choice-btn .cl {
  display: inline-flex; align-items:center; justify-content:center;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--green3); font-size: 0.7rem;
  font-family: 'Mitr', sans-serif; margin-right: 8px;
  color: var(--green2); flex-shrink:0; vertical-align:middle;
}
.choice-btn.chosen-good  { border-color:var(--sage);  background:rgba(90,138,90,0.1); }
.choice-btn.chosen-ok    { border-color:var(--gold);  background:rgba(212,137,42,0.08); }
.choice-btn.chosen-stuck { border-color:var(--rose);  background:rgba(212,117,106,0.08); }

function getMinnaQuote() {
  const key = (activeOpeningVariant && activeOpeningVariant.phqa && MINNA_POOL[activeOpeningVariant.phqa])
    ? activeOpeningVariant.phqa : '_default';
  const pool = MINNA_POOL[key];
  return pool[Math.floor(Math.random() * pool.length)];
}

// Mapping: PHQ-A cluster → skin key
let activeTrack = null;
let _scenesSnapshot = null; // snapshot ของ SCENES default fields สำหรับ reset

function _buildScenesSnapshot() {
  _scenesSnapshot = SCENES.map(sc => ({
    charSub:      sc.char.sub,
    text:         sc.text,
    inner:        sc.inner,
    depathologize: sc.depathologize,
    copingHint:   sc.copingHint || null,
  }));
}

function _resetScenesToDefault() {
  if (!_scenesSnapshot) return;
  // Scene 0 ถูก patch โดย applyOpeningVariant() แยกต่างหาก
  // ไม่ reset scene 0 เพื่อไม่ให้ทับ variant ที่ inject ไปแล้ว
  SCENES.forEach((sc, i) => {
    if (i === 0) return; // skip scene 0
    const snap = _scenesSnapshot[i];
    if (!snap) return;
    sc.char.sub      = snap.charSub;
    sc.text          = snap.text;
    sc.inner         = snap.inner;
    sc.depathologize = snap.depathologize;
    if (snap.copingHint !== null) sc.copingHint = snap.copingHint;
    else delete sc.copingHint;
  });
}

function applyTrackToScenes(trackKey) {
  _resetScenesToDefault();
  if (!trackKey) { activeTrack = null; console.log('[Track] reset to default (no track)'); return; }
  const track = NARRATIVE_TRACKS[trackKey];
  if (!track) { activeTrack = null; console.warn('[Track] key not found:', trackKey); return; }
  activeTrack = track;
  const injected = [];
  Object.entries(track.scenes).forEach(([sceneIdx, patch]) => {
    const sc = SCENES[parseInt(sceneIdx)];
    if (!sc) return;
    if (patch.charSub)       sc.char.sub      = patch.charSub;
    if (patch.text)          sc.text          = patch.text;
    if (patch.inner)         sc.inner         = patch.inner;
    if (patch.depathologize) sc.depathologize = patch.depathologize;
    if (patch.copingHint !== undefined) {
      if (patch.copingHint) sc.copingHint = patch.copingHint;
      else delete sc.copingHint;
    }
    injected.push(parseInt(sceneIdx));
  });
  console.log(`[Track] applied "${trackKey}" → scenes`, injected);
}

// สุ่ม variant และ inject เข้า scene 0 + track 1-7
let activeOpeningVariant = null;
function applyOpeningVariant() {
  // item 8: สุ่มระหว่าง psychomotor_agitation / psychomotor_retardation
  let pool = OPENING_VARIANTS.slice();
  const agitation   = pool.find(x => x.phqa === 'psychomotor_agitation');
  const retardation = pool.find(x => x.phqa === 'psychomotor_retardation');
  pool = pool.filter(x => x.phqa !== 'psychomotor_agitation' && x.phqa !== 'psychomotor_retardation');
  const chosen8 = (Math.random() < 0.5) ? agitation : retardation;
  if (chosen8) pool.push(chosen8);

  const v = pool[Math.floor(Math.random() * pool.length)];
  activeOpeningVariant = v;

  // inject scene 0
  const sc = SCENES[0];
  sc.mood           = v.mood;
  sc.char.sub       = v.sub;
  sc.text           = v.text;
  sc.inner          = v.inner;
  sc.emotions       = v.emotions;
  sc.depathologize  = v.depathologize;
  sc.copingHint     = v.copingHint;
  sc.choices = [
    { text: v.choiceA, type: 'good' },
    { text: v.choiceB, type: 'ok' },
  ];
  sc.outcomes = {
    good: { type: 'good', title: v.outcomeGood.title, text: v.outcomeGood.text, satir: v.outcomeGood.satir },
    ok:   { type: 'ok',   title: v.outcomeOk.title,  text: v.outcomeOk.text,  satir: v.outcomeOk.satir },
  };
  // patch body signal ของ scene 0
  if (BODY_SIGNALS && BODY_SIGNALS.main && BODY_SIGNALS.main[0]) {
    BODY_SIGNALS.main[0].signal = v.bodySignal;
    BODY_SIGNALS.main[0].note   = v.bodyNote;
  }
  // apply narrative track สำหรับ scene 1-7 ตาม PHQ-A cluster
  const trackKey = (typeof CLUSTER_TO_TRACK !== 'undefined') ? (CLUSTER_TO_TRACK[v.phqa] || null) : null;
  applyTrackToScenes(trackKey);
}

// ══════════════ PARTICLES ══════════════
function initParticles(){
  const wrap=document.getElementById('particles');
  const colors=['#a8d5a8','#c8e6c8','#d4892a','#f0d080','#f5e8c8','#7ab87a','#fde8d0'];
  const shapes=['🌸','🌿','✨','🍃','⭐','💚'];
  for(let i=0;i<18;i++){
    const p=document.createElement('div');
    p.className='particle';
    const useEmoji=Math.random()>0.5;
    if(useEmoji){
      p.style.cssText=`width:16px;height:16px;background:none;font-size:${10+Math.random()*8}px;line-height:1;border-radius:0;`;
      p.textContent=shapes[Math.floor(Math.random()*shapes.length)];
    } else {
      const size=4+Math.random()*6;
      p.style.cssText=`width:${size}px;height:${size}px;background:${colors[Math.floor(Math.random()*colors.length)]};`;
    }
    p.style.left=Math.random()*100+'%';
    p.style.animationDuration=(8+Math.random()*14)+'s';
    p.style.animationDelay=(Math.random()*12)+'s';
    wrap.appendChild(p);
  }
}

// ══════════════ CONFETTI ══════════════
function launchConfetti(){
  const wrap=document.getElementById('confettiWrap');
  const colors=['#5a8a5a','#d4892a','#7ab5d4','#c8e6c8','#f0a840','#a8d5a8','#f5c842'];
  for(let i=0;i<40;i++){
    const c=document.createElement('div');
    c.className='conf';
    c.style.cssText=`left:${20+Math.random()*60}%;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*0.6}s;animation-duration:${1.4+Math.random()*0.8}s;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>0.5?'50%':'3px'};`;
    wrap.appendChild(c);
  }
  setTimeout(()=>{ wrap.innerHTML=''; },3000);
}

// ══════════════ TYPEWRITER ══════════════
function typeWriter(el, text, speed=18){
  el.textContent=''; el.classList.add('typing');
  let i=0;
  const tick=()=>{
    if(i<text.length){ el.textContent+=text[i++]; setTimeout(tick,speed); }
    else { el.classList.remove('typing'); }
  };
  tick();
}

// ══════════════ MINNA CSS CHARACTER ══════════════
function minnaHTML(mood){
  const mouths={
    happy:`<div class="mouth-happy"></div>`,
    sad:`<div class="mouth-sad"></div>`,
    angry:`<div class="mouth-neutral" style="width:10px;height:2.5px;background:#c07050;transform:rotate(-8deg)"></div>`,
    confused:`<div class="mouth-neutral" style="width:8px;height:2px;background:#c07050;transform:rotate(5deg)"></div>`,
    thinking:`<div class="mouth-neutral"></div>`,
    brave:`<div class="mouth-happy" style="width:14px;height:7px"></div>`,
  };
  const eyeStyle={
    angry:`transform:rotate(-15deg);margin-top:2px`,
    confused:`transform:rotate(8deg)`,
    sad:`transform:translateY(1px)`,

  const es=eyeStyle[mood]||'';
  return `<div class="minna-char">
    <div class="minna-hair"></div>
    <div class="minna-face">
      <div class="minna-cheeks"><div class="cheek"></div><div class="cheek"></div></div>

      <div class="minna-mouth">${mouths[mood]||mouths.neutral}</div>
    </div>
    <div class="minna-body"></div>
    <div class="minna-collar"></div>
  </div>`;
}

function renderCharHTML(charId, mood){

  return minnaHTML(mood);

// ══════════════ MODE SWITCH ══════════════
function switchMode(m){
  mode=m;
  ['story','bonus','iceberg','coping'].forEach(t=>document.getElementById(TAB_IDS[t]).classList.toggle('active',t===m));
  const isStory=m==='story';
  document.getElementById('stageBarWrap').style.display=isStory?'block':'none';
  document.getElementById('emoBarWrap').style.display=isStory?'block':'none';
  if(m==='story')   renderScene();
  if(m==='bonus')   renderBonus();
  if(m==='iceberg') renderIceberg();
  if(m==='coping')  renderCoping();
}

// ══════════════ STORY ══════════════
function renderStageBar(){
  const sc=SCENES[currentScene];
  let html='';
  STAGES.forEach((s,i)=>{
    const done=i<sc.stage, active=i===sc.stage;
    html+=`<div class="ps ${done?'done':active?'active':''}">
      <div class="dot"></div>
      <div class="lbl">${s.icon}<br>${s.label}</div>
    </div>`;
    if(i<STAGES.length-1) html+=`<div class="ps-line"></div>`;
  });
  document.getElementById('stageBar').innerHTML=html;
}

function renderEmotions(emotions){
  const labels={confused:'สับสน',scared:'กลัว',brave:'กล้า',hopeful:'หวัง',proud:'ภูมิใจ',angry:'โกรธ'};
  document.getElementById('emoList').innerHTML=Object.keys(labels).map(e=>
    `<span class="emo-tag ${e} ${emotions.includes(e)?'active':''}">${labels[e]}</span>`
  ).join('');
}

function renderScene(){
  const sc=SCENES[currentScene];
  renderStageBar(); renderEmotions(sc.emotions);
  const depathHtml=sc.depathologize?`<div class="depathologize">${sc.depathologize}</div>`:'';
  const copingHtml=sc.copingHint?`<div class="coping-hint">${sc.copingHint}</div>`:'';
  const chooserHtml=sc.chooserNote?`<div class="chooser-box">${sc.chooserNote}</div>`:'';

  document.getElementById('mainArea').innerHTML=`
    <div class="stage-badge">${STAGES[sc.stage].icon} ระยะที่ ${sc.stage+1}: ${STAGES[sc.stage].label}${currentScene===0 && activeOpeningVariant ? ` <span style="font-size:0.72rem;opacity:0.75;font-weight:400;margin-left:6px">${activeOpeningVariant.badge}</span>` : ''}${activeTrack && currentScene>0 ? ` <span style="font-size:0.72rem;opacity:0.7;font-weight:400;margin-left:6px">${activeTrack.label}</span>` : ''}</div>
    <div class="scene-card">
      <div class="char-row">
        ${renderCharHTML(sc.char.id||'minna', sc.mood||'happy')}
        <div><div class="char-name">${sc.char.name}</div><div class="char-sub">${sc.char.sub}</div></div>
      </div>
      <p class="scene-text" id="sceneText"></p>
      <div class="inner-voice" id="innerVoice" style="opacity:0">${sc.inner}</div>
      ${depathHtml}${copingHtml}${chooserHtml}
      <div id="choiceArea" style="opacity:0;transition:opacity 0.5s">
        <div class="choices-label">มินนาควรทำอะไร?</div>
        ${sc.choices.map((c,i)=>`
          <button class="choice-btn" onclick="chooseOption(${i})" id="cb${i}">
            <span class="cl">${String.fromCharCode(65+i)}</span>${c.text}
          </button>`).join('')}
      </div>
      <div id="outcomeArea"></div>
    </div>`;

  // typewriter then reveal
  const textEl=document.getElementById('sceneText');
  typeWriter(textEl, sc.text, 16);
  setTimeout(()=>{
    const iv=document.getElementById('innerVoice');
    if(iv){ iv.style.transition='opacity 0.6s'; iv.style.opacity='1'; }
    injectTuningBtn('main', currentScene);
  }, sc.text.length*16+200);
  setTimeout(()=>{
    const ca=document.getElementById('choiceArea');
    if(ca) ca.style.opacity='1';
  }, sc.text.length*16+600);
}

function chooseOption(idx){
  const sc=SCENES[currentScene];
  const choice=sc.choices[idx];
  const outcome=sc.outcomes[choice.type];
  sc.choices.forEach((_,i)=>{
    const b=document.getElementById(`cb${i}`);
    b.disabled=true;
    if(i===idx) b.classList.add(`chosen-${choice.type}`);
  });
  const isGood = ['good','friend','connect','brave','explore','present'].includes(choice.type);
  const isOk   = choice.type === 'ok';
  const scoreType = isGood ? 'good' : choice.type;
  chosenTypes.push(scoreType);
  nScenesPlayed++;
  if(isGood){ scoreGrowth+=2; scoreCourage+=2; scoreHeart+=2; launchConfetti(); }
  else if(isOk){ scoreGrowth+=1; /* courage+0 */ scoreHeart+=1; }
  else { /* stuck/delegate/withdraw/deflect */ scoreCourage+=1; }
  const displayType = outcome.type || (scoreType==='good'?'good':scoreType);
  document.getElementById('outcomeArea').innerHTML=`
    <div class="outcome-box ${displayType}">
      <div class="outcome-title">${outcome.title}</div>
      <div>${outcome.text}</div>
      <div class="satir-note">${outcome.satir.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div>
    </div>
    ${sc.fafReveal ? renderFafPanel() : ''}
    <button class="btn-next" onclick="nextScene()">${sc.nextLabel}</button>`;
}

function selectFaf(id){
  document.querySelectorAll('.faf-opt-btn').forEach(b=>{ b.disabled=true; b.classList.remove('selected'); });
  const btn=document.getElementById(`fafOpt_${id}`);
  if(btn) btn.classList.add('selected');
  const opt=FAF_OPTIONS.find(o=>o.id===id);
  if(!opt) return;
  const ins=document.getElementById('fafInsight');
  const bridge=document.getElementById('fafBridge');
  if(ins){ ins.textContent=opt.insight; ins.classList.add('visible'); }
  if(bridge) bridge.style.display='block';
  scoreDepth=Math.min(10, scoreDepth+2); // FaF self-ID counts toward depth score
}

function nextScene(){
  if(currentScene<SCENES.length-1){ currentScene++; renderScene(); window.scrollTo({top:0,behavior:'smooth'}); }

function toggleLayer(id){

        <div class="bonus-story-grid">`;
    Object.entries(BONUS_STORIES).forEach(([key,story])=>{
      html+=`<div class="bonus-card" onclick="startBonusStory('${key}')">
        <div class="bonus-card-icon">${story.icon}</div>
        <div class="bonus-card-title">${story.title}</div>

          <button class="btn-restart" onclick="switchMode('story')">← กลับไปเรื่องมินนา</button>

  } else {

  }

function startBonusStory(key){
  bonusMode=key;
  bonusSceneIdx=0;
  bonusChosenTypes=[];
  renderBonusScene();
}

function renderBonusScene(){
  const story=BONUS_STORIES[bonusMode];
  const sc=story.scenes[bonusSceneIdx];
  renderEmotions(sc.emotions);
  const depathHtml=sc.depathologize?`<div class="depathologize">${sc.depathologize}</div>`:'';
  const copingHtml=sc.copingHint?`<div class="coping-hint">${sc.copingHint}</div>`:'';
  const chooserHtml=sc.chooserNote?`<div class="chooser-box">${sc.chooserNote}</div>`:'';
  document.getElementById('mainArea').innerHTML=`
    <button class="bonus-back" onclick="bonusMode=null;renderBonus()">← ${story.icon} ${story.title}</button>
    <div class="stage-badge">${story.icon} ${story.title} — ฉากที่ ${bonusSceneIdx+1}/${story.scenes.length}</div>
    <div class="scene-card">
      <div class="char-row">
        ${renderCharHTML(sc.char.id||'minna', sc.mood||'happy')}
        <div><div class="char-name">${sc.char.name}</div><div class="char-sub">${sc.char.sub}</div></div>
      </div>
      <p class="scene-text" id="sceneText"></p>
      <div class="inner-voice" id="innerVoice" style="opacity:0">${sc.inner}</div>
      ${depathHtml}${copingHtml}${chooserHtml}
      <div id="choiceArea" style="opacity:0;transition:opacity 0.5s">
        <div class="choices-label">จะทำอะไรต่อไป?</div>
        ${sc.choices.map((c,i)=>`
          <button class="choice-btn" onclick="chooseBonusOption(${i})" id="bcb${i}">
            <span class="cl">${String.fromCharCode(65+i)}</span>${c.text}
          </button>`).join('')}
      </div>
      <div id="bonusOutcomeArea"></div>
    </div>`;
  const textEl=document.getElementById('sceneText');
  typeWriter(textEl, sc.text, 16);
  setTimeout(()=>{const iv=document.getElementById('innerVoice');if(iv){iv.style.transition='opacity 0.6s';iv.style.opacity='1';}
    injectTuningBtn(bonusMode, bonusSceneIdx);
  },sc.text.length*16+200);
  setTimeout(()=>{const ca=document.getElementById('choiceArea');if(ca)ca.style.opacity='1';},sc.text.length*16+600);
}

function chooseBonusOption(idx){
  const story=BONUS_STORIES[bonusMode];
  const sc=story.scenes[bonusSceneIdx];
  const choice=sc.choices[idx];
  const outcome=sc.outcomes[choice.type];
  // Map custom types to CSS classes
  const goodTypes=new Set(['good','friend','brave','connect','pause','explore','present']);
  const okTypes=new Set(['ok','curious','withdraw','deflect','delegate']);
  const cssType = goodTypes.has(choice.type)?'good': okTypes.has(choice.type)?'ok':'stuck';
  sc.choices.forEach((_,i)=>{
    const b=document.getElementById(`bcb${i}`);
    b.disabled=true;
    if(i===idx) b.classList.add(`chosen-${cssType}`);
  });
  bonusChosenTypes.push(cssType);
  const satirMd=outcome.satir.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  const displayType = outcome.type || cssType;
  const isLast=bonusSceneIdx>=story.scenes.length-1;
  const nextLabel=sc.nextLabel||'ฉากต่อไป →';
  document.getElementById('bonusOutcomeArea').innerHTML=`
    <div class="outcome-box ${displayType}">
      <div class="outcome-title">${outcome.title}</div>
      <p>${outcome.text}</p>
      <div class="satir-note">${satirMd}</div>
    </div>
    <button class="btn-next" onclick="${isLast?`bonusMode=null;renderBonus()`:`bonusSceneIdx++;renderBonusScene()`}">${isLast?'← กลับเลือกเรื่อง':nextLabel}</button>`;
}

      </div>
      <div class="sa-q">${sc.question}</div>
      <div class="sa-choices">
        ${sc.choices.map((ch, ci) =>
          `<button class="sa-choice-btn" id="sac_${idx}_${ci}"
            onclick="pickSA(${idx},${ci},'${ch.score}','${ch.coping}')">${ch.text}</button>`
        ).join('')}
      </div>
      <div class="sa-reveal" id="saReveal${idx}">
        <div class="sa-reveal-label">✦ สิ่งที่มินนาค้นพบ</div>
        <div class="sa-concept-tag" id="saConceptTag${idx}"></div>
        <div id="saRevealText${idx}"></div>
      </div>
      <button class="sa-next-btn" id="saNextBtn${idx}"
        onclick="${idx < SA_SCENARIOS.length-1 ? `nextSAScene(${idx+1})` : 'showFinalScore()'}">
        ${idx < SA_SCENARIOS.length-1 ? 'ถัดไป →' : '🌟 ดูผลสรุปทั้งหมด'}
      </button>
    </div>`;
}

function pickSA(idx, choiceIdx, score, coping) {
  const sc = SA_SCENARIOS[idx];
  saAnswers[sc.id] = score;
  // Disable all buttons + highlight chosen
  sc.choices.forEach((_, ci) => {
    const btn = document.getElementById(`sac_${idx}_${ci}`);
    btn.disabled = true;
    if(ci === choiceIdx) btn.classList.add(`chosen-${score}`);
  });
  // Show reveal
  const reveal = document.getElementById(`saReveal${idx}`);
  document.getElementById(`saConceptTag${idx}`).textContent = sc.concept;
  document.getElementById(`saRevealText${idx}`).innerHTML =
    `<div style="margin-bottom:6px;font-size:0.78rem;color:var(--muted)">วิธีรับมือของเรา: <strong>${coping}</strong></div>${sc.reveal}`;
  reveal.classList.add('visible');
  // Show next button
  const nextBtn = document.getElementById(`saNextBtn${idx}`);
  nextBtn.classList.add('visible');
}

function nextSAScene(idx) {
  saCurrentIdx = idx;
  renderSAScene(idx);
}

function calcSAScore(dim) {
  // หา scenario ที่ map กับ dim นั้น
  const sc = SA_SCENARIOS.find(s => s.dim === dim);
  if(!sc) return 0;
  const ans = saAnswers[sc.id];
  if(ans === 'good') return 2;
  if(ans === 'ok')   return 1;
  return 0; // stuck
}

function showFinalScore() {
  // คำนวณ game scores
  const n = Math.max(nScenesPlayed, 1);
  const gGame = scoreGrowth / (n*2) * 10;
  const cGame = scoreCourage / (n*2) * 10;
  const hGame = scoreHeart   / (n*2) * 10;

  // Self-report (scale 0-2 → 0-10 for weighting)
  const gSelf = calcSAScore('growth')  * 5;  // 0,5,10
  const cSelf = calcSAScore('courage') * 5;
  const hSelf = calcSAScore('connect') * 5;

  // Final: 70% game + 30% self
  const g = Math.min(10, Math.round(gGame * 0.7 + gSelf * 0.3));
  const c = Math.min(10, Math.round(cGame * 0.7 + cSelf * 0.3));
  const h = Math.min(10, Math.round(hGame * 0.7 + hSelf * 0.3));
  const d = Math.min(10, tuningCount*2+1);

  document.getElementById('saContent').innerHTML = `
    <div style="text-align:center;padding:8px 0 4px">
      <div style="font-size:1.6rem;margin-bottom:8px">🌸</div>
      <div style="font-family:'Mitr',sans-serif;color:var(--green2);font-size:1rem;margin-bottom:4px">ผลรวมทั้งหมด</div>
      <div style="font-size:0.78rem;color:var(--muted);margin-bottom:16px;line-height:1.7">
        จากการเลือกตลอดเรื่อง + การสะท้อนตัวเอง
      </div>
    </div>
    <div class="score-row">
      <div class="s-orb" title="เลือกสิ่งที่ดีต่อตัวเองบ่อยแค่ไหน"><div class="orb g">${g}</div><div class="orb-lbl">การเติบโต</div></div>
      <div class="s-orb" title="กล้าตัดสินใจชัดเจน ไม่วนอยู่กลางๆ"><div class="orb c">${c}</div><div class="orb-lbl">ความกล้า</div></div>
      <div class="s-orb" title="ใส่ใจความสัมพันธ์กับคนรอบข้าง"><div class="orb h">${h}</div><div class="orb-lbl">ความเชื่อมต่อ</div></div>
      <div class="s-orb" title="หยุดฟังร่างกายตัวเองระหว่างเล่น"><div class="orb d">${d}</div><div class="orb-lbl">ความลึก</div></div>
    </div>
    <div class="score-updated-note">คะแนนทุกแบบมีความหมาย — ไม่มีถูกหรือผิด<br>แค่บอกว่าวันนี้เราเดินทางไปแบบไหน</div>`;
}

  ['story','bonus','iceberg','coping'].forEach(t=>document.getElementById(TAB_IDS[t]).classList.toggle('active',t==='story'));

}

    { signal: 'หน้าอกขยาย · รู้สึกมีพื้นที่ในร่างกายมากขึ้น · ยิ้มเองโดยไม่ตั้งใจ', note: 'การช่วยเหลือจากจุดแข็ง (ไม่ใช่จากความกลัว) ให้ความรู้สึกทางร่างกายที่แตกต่าง' },
  ],
  study: [
    { signal: 'คอตึง · ตาล้า · หน้าผากขมวด', note: 'ความเครียดสะสมมักแสดงออกที่คอ บ่า และใบหน้าก่อนที่เราจะรู้ตัว' },
    { signal: 'กรามแน่น · หายใจสั้นและเร็ว · กระเพาะรู้สึกแน่นและคลื่นไส้เล็กน้อย', note: 'ความกดดันจากความคาดหวังสะสมในร่างกายก่อนที่เราจะรู้ตัว — กรามและท้องมักรับไว้ก่อน' },
    { signal: 'รู้สึก "หนัก" ทั่วร่างกาย · ตาหนัก · อยากนอนลงกับพื้น', note: 'ความเหนื่อยล้าทางจิตใจสะท้อนออกมาทางร่างกายได้จริง' },
    { signal: 'ไหล่ผ่อน · หน้าอกขยาย · รู้สึกมีพลังงานกลับมาเล็กน้อย', note: 'การตัดสินใจที่สอดคล้องกับตัวเองมักตามมาด้วยพลังงานที่กลับคืน' },
  ],
  bullying: [
    { signal: 'คอและขากรรไกรแข็ง · หน้าร้อนแดง · มือกำแน่น · หัวใจเต้นแรงและเร็ว', note: 'ความโกรธและความกลัวให้ความรู้สึกทางร่างกายคล้ายกัน — ทั้งคู่เป็นสัญญาณว่ามีบางอย่างสำคัญกำลังถูกคุกคาม' },
    { signal: 'หน้าอกหนักและแน่น · ลมหายใจหยุดชั่วขณะ · รู้สึกราวกับพื้นดินยุบลง', note: 'เมื่อรู้สึกโดดเดี่ยว ร่างกายตอบสนองราวกับอยู่ในอันตรายจริงๆ — ความโดดเดี่ยวเจ็บปวดได้ทางกายด้วย' },
    { signal: 'บริเวณอกและลำคอแน่น · ตาเริ่มชื้น · มือกำสิ่งของแน่นโดยไม่รู้ตัว', note: 'ความเจ็บปวดจากการถูกทำร้ายเป็นความเจ็บปวดจริงๆ ทั้งทางใจและกาย ไม่ใช่แค่ความรู้สึก' },
    { signal: 'ไหล่ผ่อน · หายใจลึกขึ้น · รู้สึกมีคนอยู่ข้างๆ', note: 'การได้รับการสนับสนุนทำให้ร่างกายออกจากโหมดเอาตัวรอดได้' },
  ],
};

// ── Tuning-in state ──
let tuningOverlayEl = null;
let tuningBreathTimer = null;
let currentTuningKey = null;
let currentTuningIdx = null;
let tuningUsed = {}; // { 'main-0': true, 'family-2': true, ... }

function openTuning(storyKey, sceneIdx) {
  currentTuningKey = storyKey;
  currentTuningIdx = sceneIdx;

  const signals = BODY_SIGNALS[storyKey];
  const data = signals && signals[sceneIdx] ? signals[sceneIdx] : {
    signal: 'สังเกตว่าร่างกายรู้สึกอย่างไรในขณะนี้',
    note: 'ทุกความรู้สึกทางร่างกายมีข้อความบางอย่างบอก'
  };

  const key = `${storyKey}-${sceneIdx}`;
  if(!tuningUsed[key]) tuningCount++;
  tuningUsed[key] = true;

  const overlay = document.createElement('div');
  overlay.className = 'tuning-overlay';
  overlay.id = 'tuningOverlay';
  overlay.innerHTML = `
    <div class="tuning-panel">
      <h3>🫁 Tuning-in — สังเกตร่างกาย</h3>
      <p class="t-sub">หยุดสักครู่ · แค่สังเกต · ไม่ต้องหายใจตาม</p>
      <div class="breath-ring-wrap">
        <div class="breath-ring-outer"></div>
        <div class="breath-ring-inner">🫁</div>
      </div>
      <div class="breath-label" id="breathLabel">หายใจเข้าช้าๆ...</div>
      <div class="body-signal" id="bodySignal">
        <div class="body-signal-label">✦ สัญญาณร่างกายในฉากนี้</div>
        ${data.signal}
      </div>
      <div class="observer-note" id="observerNote">${data.note}</div>
      <button class="tuning-close-btn" id="tuningCloseBtn" onclick="closeTuning()">กลับไปเลือก 🌿</button>
    </div>`;
  document.body.appendChild(overlay);
  tuningOverlayEl = overlay;

  // Breathing label cycle
  const labels = ['หายใจเข้าช้าๆ...','กลั้นไว้สักครู่...','หายใจออกช้าๆ...','หยุดพักสักครู่...'];
  let li = 0;
  const lEl = overlay.querySelector('#breathLabel');
  const labelTick = () => { li = (li+1)%4; if(lEl) lEl.textContent = labels[li]; };
  tuningBreathTimer = setInterval(labelTick, 1000);

  // Show body signal after 2s, observer note after 3s, close btn after 4s
  setTimeout(() => { const el=overlay.querySelector('#bodySignal'); if(el) el.classList.add('visible'); }, 2000);
  setTimeout(() => { const el=overlay.querySelector('#observerNote'); if(el) el.classList.add('visible'); }, 3200);
  setTimeout(() => { const el=overlay.querySelector('#tuningCloseBtn'); if(el) el.classList.add('visible'); }, 4200);
}

function closeTuning() {
  if(tuningBreathTimer) clearInterval(tuningBreathTimer);
  if(tuningOverlayEl) { tuningOverlayEl.remove(); tuningOverlayEl = null; }
}

// ── inject tuning button into scene ──
function injectTuningBtn(storyKey, sceneIdx) {
  const innerVoice = document.getElementById('innerVoice');
  if(!innerVoice) return;
  const existing = document.getElementById('tuningBtnInline');
  if(existing) existing.remove();
  const btn = document.createElement('button');
  btn.id = 'tuningBtnInline';
  btn.className = 'tuning-btn';
  const used = tuningUsed[`${storyKey}-${sceneIdx}`];
  btn.innerHTML = `<span class="tb-icon">🫁</span><span>หยุดสักครู่ — สังเกตร่างกาย${used?' ✓':''}</span><span class="tb-skip">ข้ามได้</span>`;
  btn.onclick = () => openTuning(storyKey, sceneIdx);
  innerVoice.insertAdjacentElement('afterend', btn);
}

// ── DEV: force a specific track for UI testing ──
// Usage in console: testTrack('sleep')
function testTrack(phqaKey) {
  const trackKey = CLUSTER_TO_TRACK[phqaKey];
  if (!trackKey) { console.error('Unknown phqa key:', phqaKey, '| Valid:', Object.keys(CLUSTER_TO_TRACK)); return; }
  // Patch opening variant mock
  activeOpeningVariant = { phqa: phqaKey };
  // Reset and apply
  currentScene = 0; chosenTypes = []; scoreGrowth = 0; scoreCourage = 0; scoreHeart = 0;
  tuningCount = 0; nScenesPlayed = 0; saAnswers = {}; tuningUsed = {};
  openLayers.clear(); openCopings.clear();
  _resetScenesToDefault();
  applyTrackToScenes(trackKey);
  // Patch scene 0 with minimal variant data
  const ov = OPENING_VARIANTS.find(x => x.phqa === phqaKey) || OPENING_VARIANTS[0];
  if (ov) {
    SCENES[0].mood = ov.mood; SCENES[0].char.sub = ov.sub;
    SCENES[0].text = ov.text; SCENES[0].inner = ov.inner;
    SCENES[0].emotions = ov.emotions; SCENES[0].depathologize = ov.depathologize;
    SCENES[0].copingHint = ov.copingHint;
    SCENES[0].choices = [{text:ov.choiceA,type:'good'},{text:ov.choiceB,type:'ok'}];
    SCENES[0].outcomes = {good:{type:'good',title:ov.outcomeGood.title,text:ov.outcomeGood.text,satir:ov.outcomeGood.satir},ok:{type:'ok',title:ov.outcomeOk.title,text:ov.outcomeOk.text,satir:ov.outcomeOk.satir}};
    if (BODY_SIGNALS && BODY_SIGNALS.main && BODY_SIGNALS.main[0]) {
      BODY_SIGNALS.main[0].signal = ov.bodySignal; BODY_SIGNALS.main[0].note = ov.bodyNote;
    }
  }
  mode = 'story';
  document.getElementById('stageBarWrap').style.display = 'block';
  document.getElementById('emoBarWrap').style.display = 'block';
  renderScene();
  console.log(`[testTrack] Now playing track: ${trackKey} (phqa: ${phqaKey})`);
}

// Init
initParticles();
_buildScenesSnapshot(); // snapshot default SCENES fields ก่อน apply skin
applyOpeningVariant(); // สุ่ม PHQ-A opening scenario ตอนโหลด
renderScene();
</script>
